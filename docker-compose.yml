version: '3'
services:
  web:
    build: .
    ports:
      - "8000:80"
    volumes:
      - ./html:/var/www/html
    depends_on:
      - db
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: user
      MYSQL_PASSWORD: 
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data: